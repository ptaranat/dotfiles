# Package lists for the Linux box. macOS installs from the Brewfile instead;
# these two are deliberately separate rather than one unified list, because
# `brew bundle` handles taps and casks that have no apt equivalent, and the
# Brewfile is generated by `brew bundle dump`.
#
# Referenced by run_onchange_after_11-packages-linux.sh.tmpl, which hashes this
# file into itself so that editing the list actually triggers a reinstall.
#
# Every name below was checked against `apt-cache policy` on Debian trixie.
# Adding a name that does not exist makes the whole apt-get call fail.

packages:
  apt:
    # Shell, VCS and build basics. Present on any machine that runs this repo.
    core:
      - zsh
      - git
      - git-delta
      - tmux
      - curl
      - wget
      - unzip
      - build-essential
      - gnupg
      - locales
      # Provides bwrap, which Claude Code uses to sandbox tool calls on Linux.
      # It was previously a manual brew install, and `brew autoremove`
      # reclassified it as an unneeded dependency the moment the formulae that
      # happened to need it were removed. Pinned to the list so that cannot
      # happen silently again.
      - bubblewrap

    # The CLI tools the zsh config actually invokes. rc.d breaks without most
    # of these: 01-environment points FZF_DEFAULT_COMMAND at rg, 04-functions
    # shells out to fzf, bat and delta, 05-completion previews with eza.
    tools:
      - ripgrep
      - fd-find
      - bat
      - eza
      - fzf
      - zoxide
      - jq
      - shellcheck
      - just
      - glow
      - tealdeer
      - mosh
      - httpie
      - hyperfine
      # v2, and the same major as the brew formula it replaces. Listed here
      # specifically because `brew install awscli` brings its own python@3.12
      # along with it -- an interpreter nothing declared and mise cannot see.
      # Debian's builds against the system python3 instead.
      - awscli

  # Tools where brew's version is preferred over apt's. The rule is per-tool
  # quality, not per-package-manager loyalty: take whichever version is
  # actually better and write down why.
  #
  # This list OVERRIDES rather than replaces packages.apt. A name can appear in
  # both, and for anything the shell config hard-depends on it should: the apt
  # entry guarantees a fresh machine has a working version, and the brew entry
  # upgrades it on machines that have brew. Removing the apt entry to "avoid
  # duplication" would leave a fresh box with no rg at all, and
  # FZF_DEFAULT_COMMAND breaks outright without one.
  #
  # Nothing installs these automatically yet -- see the TODO at the bottom of
  # the install script. Adding to this list is a decision, not a convenience.
  brew:
    linux:
      # apt has 0.10.4; the nvim config uses the native 0.11 LSP API and the
      # treesitter main branch, which need >= 0.11.
      - neovim
      # Moves fast, and is the git credential helper and commit-signing path.
      # apt's 2.46 will drift into problems.
      - gh
      # apt is stuck on 14.1.1, brew is on 15.2.0. Also stays in packages.apt
      # as the floor -- see the note above about why both entries are correct.
      - ripgrep
      # apt 1.40.0 against brew 1.57.0, seventeen minor versions of justfile
      # syntax. The widest apt-vs-brew gap of anything on this box.
      - just

  # Not in apt at all, and not worth a brew install either. Each has a
  # first-party installer or a single release binary.
  #   mise   -> https://mise.run
  #   sesh   -> GitHub release; dot_tmux.conf's session popup needs it
  #   bottom, helix, k9s -> GitHub releases, install if actually wanted
