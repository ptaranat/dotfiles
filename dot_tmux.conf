# TERM as seen *inside* tmux. tmux-256color is the terminfo that actually
# describes tmux; the old xterm-256color claimed to be something tmux is not,
# which misreports capabilities (notably italics) to programs in the panes.
set -g default-terminal tmux-256color

# Truecolor. This has to be stated separately because tmux-256color, unlike
# xterm-ghostty, does not advertise Tc/RGB itself, so switching the line above
# on its own would quietly downgrade srcery's 24-bit colours to the 256-colour
# approximation and stop nvim matching the tmux status bar.
#
# terminal-features is keyed on the OUTER terminal's name, not the one above,
# so each terminal actually used needs listing. Appended with -as rather than
# set with -g to keep tmux's built-in feature table.
set -as terminal-features ",xterm-ghostty:RGB"
set -as terminal-features ",xterm-kitty:RGB"

# Status on top
set-option -g status-position bottom

# Kill on quit
set -g detach-on-destroy on

# Set C-a as prefix
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# No delay esc
set -sg escape-time 0

# Mouse mode
set -g mouse on

# Start numbering at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Windows
setw -g automatic-rename on
set -g set-titles on

# Use vim-like keys for splits and windows
bind-key v split-window -h
bind-key s split-window -v
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind-key S choose-session
set-window-option -g mode-keys vi

# Keybindings
bind-key X confirm-before kill-session
bind-key x kill-pane
bind-key & kill-window
bind-key "T" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

# Status bar
# set -g status-left-style "none"
# set -g status-right-style "none"
# set -g status-right-length "100"
# set -g status-left-length "100"

# TPM
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'srcery-colors/srcery-tmux'
set -g @srcery_tmux_patched_font '1'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'

# Persist sessions across restarts.
#
# resurrect saves the session layout on demand (prefix + Ctrl-s) and restores
# it (prefix + Ctrl-r); continuum does both automatically, saving every 15
# minutes and restoring when the server starts.
#
# Worth having because a tmux server does not survive its binary being
# replaced: upgrading tmux under a running server leaves the old sessions
# listable but impossible to attach to, and killing the server is then the only
# way out. With these, that costs at most fifteen minutes of layout.
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
# Save scrollback too, not just which programs were running.
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

run '~/.tmux/plugins/tpm/tpm'
