# Naming the format explicitly means starship only evaluates these modules.
# Left unset it probes for every language it supports on each prompt, which is
# the main cost in a starship prompt.
format = """
$directory\
$git_branch\
$git_status\
$kubernetes\
$aws\
$character"""

right_format = "$cmd_duration$nodejs$python$golang"

add_newline = true
command_timeout = 1000

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold yellow)"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold cyan"
read_only = " 󰌾"

[git_branch]
symbol = " "
style = "bold purple"

[git_status]
style = "bold yellow"
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "$"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

# Only shown when the prompt takes real time, so it does not add noise.
[cmd_duration]
min_time = 2000
format = "[$duration]($style) "
style = "dimmed yellow"

# Cluster context matters enough to be worth the line: kubectl is the single
# most-used command in this shell's history.
[kubernetes]
disabled = false
symbol = "☸ "
style = "dimmed blue"
format = '[$symbol$context( \($namespace\))]($style) '

[aws]
symbol = " "
style = "dimmed yellow"
format = '[$symbol$profile( \($region\))]($style) '

[nodejs]
symbol = " "
style = "dimmed green"
format = "[$symbol($version)]($style) "

[python]
symbol = " "
style = "dimmed yellow"
format = '[$symbol($version)( \($virtualenv\))]($style) '

[golang]
symbol = " "
style = "dimmed cyan"
format = "[$symbol($version)]($style) "
