# Deliberately close to starship's default.
#
# An earlier version of this file hand-built a p10k-style powerline. Two things
# made that a bad fit. Starship has no segment concept, so every background has
# to be maintained by hand and naming modules explicitly in `format` means any
# module left out never renders at all -- which silently hid gleam. And the
# effect that made p10k's rainbow work, swapping the git background from green
# to yellow when the tree is dirty, has no starship equivalent: only foreground
# colours are conditional.
#
# So: no explicit `format`. Starship's default is `$all`, which renders every
# module in a sensible order and, importantly, cannot lose a module the way an
# explicit list can. Everything below is presentation only.
#
# Nerd Font glyphs are used throughout; a few starship defaults are actual
# emoji rather than glyphs (gleam ships a star) and those are swapped for a
# monochrome glyph or a short text label.
#
# ghostty is set to MesloLGS Nerd Font; "SF Mono Square" is also installed.

add_newline = true
command_timeout = 1000

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold yellow)"

[directory]
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "…/"
style = "bold cyan"
read_only = " 󰌾"

[git_branch]
symbol = " "
style = "bold purple"

[git_status]
style = "bold yellow"
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "*${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[cmd_duration]
min_time = 2000
format = "[took $duration]($style) "
style = "dimmed yellow"

# --- context ---------------------------------------------------------------

# The kubeconfig is empty now, but this stays enabled so it lights up again if
# a cluster is ever added, rather than being a module to remember to re-enable.
[kubernetes]
disabled = false
symbol = "☸ "
style = "dimmed blue"
format = '[$symbol$context( \($namespace\))]($style) '

[aws]
symbol = " "
style = "dimmed yellow"
format = '[$symbol$profile( \($region\))]($style) '

[terraform]
symbol = "󱁢 "
style = "dimmed 105"

# Would print "orbstack" in every directory with a compose file, which is noise
# when there is only ever one context.
[docker_context]
disabled = true

